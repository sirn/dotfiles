# RTK (Rust Token Killer) permission entries for OpenCode
#
# OpenCode evaluates permissions on the rewritten command (after
# tool.execute.before hook), not the original. These entries allow
# RTK-rewritten commands to pass permission checks.
#
# Deny/ask rules use substring mode and already match RTK-prefixed
# commands (e.g., "* git push *" matches "rtk git push origin main"),
# so only allow entries are needed here.
#
# TODO: Remove these entries once the permission.ask plugin hook is
# implemented upstream (https://github.com/anomalyco/opencode/issues/7006).
# At that point, evaluate the original (pre-rewrite) command against
# permission rules in the RTK plugin's permission.ask hook instead.

# cat/head/tail → rtk read
[[default.commands.allow.shell]]
match = "rtk read"
mode = "prefix"

# cargo → rtk cargo
[[default.commands.allow.shell]]
match = "rtk cargo"
mode = "prefix"

[[default.commands.allow.shell]]
match = "rtk cargo check"
mode = "prefix"

[[default.commands.allow.shell]]
match = "rtk cargo clippy"
mode = "prefix"

[[default.commands.allow.shell]]
match = "rtk cargo fmt --check"
mode = "prefix"

[[default.commands.allow.shell]]
match = "rtk cargo test"
mode = "prefix"

[[default.commands.allow.shell]]
match = "rtk cargo tree"
mode = "prefix"

