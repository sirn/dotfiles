# Security Policy: Default Ask
#
# Commands are categorized into three tiers:
# - allow: Permitted without confirmation (read-only, safe operations)
# - ask: Require explicit user confirmation before execution
# - deny: Blocked entirely (never executed)
#
# Any command not explicitly in 'allow' or 'deny' defaults to 'ask'.
# This follows the principle of least privilege - unknown commands
# require confirmation rather than being silently permitted.

[default.tools]
read = true
glob = true
grep = true
list = true
webfetch = true
websearch = true

# Safe commands that don't modify state or access sensitive data
[default.commands.allow]
shell = [
  # File system navigation and listing
  "ls",
  "fd",
  "find",
  "tree",
  "lstr",

  # File content viewing (read-only)
  "cat",
  "head",
  "tail",
  "bat",
  "batcat",

  # File metadata (read-only)
  "file",
  "stat",
  "wc",

  # Text processing (read-only)
  "sort",
  "uniq",
  "cut",
  "tr",
  "sed -n",

  # Text search and filtering
  "rg",
  "grep",

  # Git - read-only operations
  "git status",
  "git diff",
  "git log",
  "git branch",

  # Jujutsu (jj) - read-only operations
  "jj status",
  "jj diff",
  "jj log",
  "jj show",

  # Go - build, test, and lint
  "go test",
  "go build",
  "go vet",
  "go fmt",
  "golangci-lint",
  "golangci-lint run",
  "staticcheck",

  # Python - testing and linting (including uv and poetry)
  "pytest",
  "python -m pytest",
  "python -m unittest",
  "ruff",
  "ruff check",
  "ruff format --check",
  "black --check",
  "isort --check-only",
  "mypy",
  "pylint",
  "flake8",
  "uv run pytest",
  "uv run ruff",
  "uv run ruff check",
  "uv run python -m pytest",
  "poetry run pytest",
  "poetry run ruff",
  "poetry run ruff check",
  "poetry run python -m pytest",

  # Rust - check, test, and lint
  "cargo",
  "cargo check",
  "cargo test",
  "cargo clippy",
  "cargo fmt --check",
  "rustc --version",
  "cargo --version",

  # JavaScript/TypeScript - linting and type checking
  "eslint",
  "prettier --check",
  "tsc --noEmit",
  "tsc -p . --noEmit",
  "node --version",
  "npm --version",

  # Ruby - linting and testing
  "rubocop",
  "bundle exec rspec",
  "bundle exec rubocop",

  # Java/Kotlin - build and check
  "./gradlew check",
  "gradle check",
  "mvn verify",
  "mvn test",
  "ktlint",

  # C/C++ - linting
  "clang-tidy",
  "cppcheck",
  "make check",

  # Nix - formatting, linting, and read-only operations
  "nixfmt",
  "nixfmt --check",
  "alejandra",
  "alejandra --check",
  "nix flake",
  "nix-linter",
  "nix-prefetch-git",
  "nix build",
  "nix-build",
  "nix search",
  "nix eval",
  "nix why-depends",
  "nix-channel --list",

  # Shell - linting and formatting check
  "shellcheck",
  "shfmt",
  "shfmt -l",
  "shfmt --check",
  "bash -n",

  # General build tools
  "make",
  "gmake",
  "just",
  "just --list",

  # HTTP clients - read-only fetching
  "curl",
  "wget",

  # Container & Orchestration - read-only inspection
  "docker ps",
  "docker ps -a",
  "docker images",
  "docker inspect",
  "docker-compose config",
  "podman ps",
  "podman ps -a",
  "podman images",
  "podman inspect",
  "kubectl get",
  "kubectl describe",
  "kubectl logs",
  "kubectl version",

  # Package Managers - list/info only
  "npm list",
  "pnpm list",
  "yarn list",
  "pip list",
  "pip freeze",
  "poetry show",
  "poetry show --tree",
  "uv pip list",
  "uv pip tree",
  "cargo tree",
  "go mod graph",
  "go mod why",
  "go mod download -x",  # dry-run mode, doesn't write
  "gem list",
  "bundle list",
  "nix path-info",
  "nix derivation show",

  # System & Environment - safe inspection
  "which",
  "command -v",
  "uname",
  "uname -a",
  "pwd",
  "whoami",
  "id",
  "echo",
  "date",
  "cat --version",
  "jq --version",
  "sed --version",
  "awk --version",

  # Database - read-only inspection
  "psql --command=\\dt",
  "psql -c \\dt",
  "pg_dump --schema-only",  # schema dump, no data
  "mysqlshow",
  "redis-cli ping",
  "redis-cli info",

  # Git - extended read-only
  "git remote -v",
  "git config --get",
  "git config --list",
  "git rev-parse",
  "git rev-parse --show-toplevel",

  # Jujutsu - extended read-only
  "jj git remote list",
  "jj bookmark list",
  "jj bookmark",

  # GitHub CLI (gh) - read-only operations only
  "gh issue list",
  "gh issue view",
  "gh issue status",
  "gh pr list",
  "gh pr view",
  "gh pr diff",
  "gh pr checks",
  "gh pr status",
  "gh repo view",
  "gh repo list",
  "gh run list",
  "gh run view",
  "gh workflow list",
  "gh workflow view",
  "gh cache list",
  "gh release list",
  "gh release view",
  "gh search repos",
  "gh search issues",
  "gh search prs",
  "gh search code",
  "gh search commits",
  "gh status",
  # gh api GET requests only (explicit allowlist for defense in depth)
  "re:\\bgh\\s+api\\b.*-\\s*X\\s+GET",
  "re:\\bgh\\s+api\\b.*--method\\s+GET",
  "re:\\bgh\\s+api\\b(?:\\s+(?!-X|--method).+)?\\s*$",  # gh api <endpoint> without -X (defaults to GET)
]

[default.commands.ask]
# All patterns use regex with word boundaries for broad matching.
# This catches subcommands passed via: bash -c "...", nix run ... -- ..., etc.
# In TOML, \\b becomes \b in the regex (word boundary), \\s becomes \s (whitespace)
shell = [
  # File/disk operations
  "re:\\brm\\b",
  "re:\\bdd\\b",
  "re:\\bmkfs\\b",
  "re:\\bfdisk\\b",
  "re:\\bshred\\b",
  "re:\\bchmod\\b",
  "re:\\bchown\\b",

  # Git operations
  "re:\\bgit\\s+commit\\b",

  # Jujutsu operations
  "re:\\bjj\\s+describe\\b",
  "re:\\bjj\\s+new\\b",
  "re:\\bjj\\s+commit\\b",
  "re:\\bjj\\s+squash\\b",
  "re:\\bjj\\s+split\\b",
  "re:\\bjj\\s+abandon\\b",
  "re:\\bjj\\s+undo\\b",

  # Environment and secret exposure risks
  "re:\\benv\\b",
  "re:\\bprintenv\\b",

  # Container execution (can run commands inside containers)
  "re:\\bdocker\\s+exec\\b",
  "re:\\bdocker\\s+run\\b",
  "re:\\bpodman\\s+exec\\b",
  "re:\\bpodman\\s+run\\b",

  # Kubernetes execution (can run commands in pods)
  "re:\\bkubectl\\s+exec\\b",
  "re:\\bkubectl\\s+run\\b",
  "re:\\bkubectl\\s+create\\b",
  "re:\\bkubectl\\s+apply\\b",
  "re:\\bkubectl\\s+delete\\b",

  # Nix - commands that can execute arbitrary code
  "re:\\bnix\\s+run\\b",
]

[default.commands.deny]
shell = [
  "sudo",
  "kill",
  "systemctl",
  "sops",
  "git push",
  "jj git push",
  # GitHub CLI API - defense in depth: block destructive methods
  # These are blocked even if user tries to approve in ask mode
  "re:\\bgh\\s+api\\b.*-\\s*X\\s+(POST|PUT|PATCH|DELETE)",
  "re:\\bgh\\s+api\\b.*--method\\s+(POST|PUT|PATCH|DELETE)",
]

[default.paths.allow]
read = [
  "**/*.env.example",
  "**/*.env.sample",
  "**/.env.example",
  "**/.env.sample",
]
edit = [
  "**/*.env.example",
  "**/*.env.sample",
  "**/.env.example",
  "**/.env.sample",
]
write = [
  "**/*.env.example",
  "**/*.env.sample",
  "**/.env.example",
  "**/.env.sample",
]

[default.paths.deny]
read = [
  "**/.env",
  "**/.env.*",
  "**/*.env",
  "**/*.pem",
  "**/*.key",
  "**/*.p12",
  "**/*.pfx",
  "**/*.jks",
  "**/*.keystore",
  "**/id_rsa",
  "**/id_ed25519",
  "**/*credential*.json",
  "**/*credentials*.json",
  "**/*secret*",
  "**/*secrets*",
  "**/*token*",
  "**/*apikey*",
  "**/*api_key*",
  "**/.aws/credentials",
  "**/.npmrc",
  "**/.pypirc",
  "**/.netrc",
  "**/.docker/config.json",
  "**/sops*.yml",
  "**/sops*.yaml",
  "**/*.agekey",
]
edit = [
  "**/.env",
  "**/.env.*",
  "**/*.env",
  "**/*.pem",
  "**/*.key",
  "**/*.p12",
  "**/*.pfx",
  "**/*.jks",
  "**/*.keystore",
  "**/id_rsa",
  "**/id_ed25519",
  "**/*credential*.json",
  "**/*credentials*.json",
  "**/*secret*",
  "**/*secrets*",
  "**/*token*",
  "**/*apikey*",
  "**/*api_key*",
  "**/.aws/credentials",
  "**/.npmrc",
  "**/.pypirc",
  "**/.netrc",
  "**/.docker/config.json",
  "**/sops*.yml",
  "**/sops*.yaml",
  "**/*.agekey",
]
write = [
  "**/.env",
  "**/.env.*",
  "**/*.env",
  "**/*.pem",
  "**/*.key",
  "**/*.p12",
  "**/*.pfx",
  "**/*.jks",
  "**/*.keystore",
  "**/id_rsa",
  "**/id_ed25519",
  "**/*credential*.json",
  "**/*credentials*.json",
  "**/*secret*",
  "**/*secrets*",
  "**/*token*",
  "**/*apikey*",
  "**/*api_key*",
  "**/.aws/credentials",
  "**/.npmrc",
  "**/.pypirc",
  "**/.netrc",
  "**/.docker/config.json",
  "**/sops*.yml",
  "**/sops*.yaml",
  "**/*.agekey",
]

[mode.plan.tools]
edit = false
write = false

[mode.build.tools]
edit = true
write = true
